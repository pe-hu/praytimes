<style>
#video {
  border:none;
  position:absolute;
  top:0; left:0;
  width:100%;
  height:100vh;
}
#video video {
  position:absolute;
  top:50%; left:50%;
  padding:0; margin:0;
  pointer-events:none;
  transform:translate(-50%,-50%);
  -webkit-transform:translate(-50%,-50%);
  width:100%;
  height:auto;
}
</style>
</head>
<body>
<div id="video">
<video src="/img/inn.mov" loop autoplay muted></video>
</div>
