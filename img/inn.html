<style>
.column #text {
  position:fixed;
  width:90%;
  height:70%;
  top:0; left:0;
  margin:2.5%;
  z-index:100;
}
.column #text a {
	font-size:1.25rem;
	background:#f3c5c6;
	border-radius:5rem;
    line-height:5rem;
    text-align:center;
    color:#fff;
	margin:0;
	position:absolute;
	top:5%; right:-5%;
	width:5rem; height:5rem;
}
.column #text a:hover {
    zoom:2;
}
.column #text a:after {
  content: "”";
  color:#fff;
  font-size:5rem;
  position:absolute;
  top:75%; left:50%;
  -webkit-transform:translate(-50%,50%);
   transform:translate(-50%,-50%);
}
.column #text a:before {
  content: "";
  position: absolute;
  bottom: -0.75rem;
  left: 1.75rem;
  border: 1.5rem solid transparent;
  border-left: 2.5rem solid #f3c5c6;
  z-index: 0;
  -webkit-transform: rotate(90deg);
  transform: rotate(0deg);
}
</style>
<script type="text/javascript">
$(function() {
    var arr = [];
    $("#columns span").each(function() {
        arr.push($(this).html());
    });
    arr.sort(function() {
        return Math.random() - Math.random();
    });
    $("#columns").empty();
    for(i=0; i < arr.length; i++) {
        $("#columns").append('<span class="column" draggable="true">' + arr[i] + '</span>');
    }
});
</script>
